spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/shipping_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 9030
  servlet:
    context-path: /shipping

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
