server:
  port: 9030
  servlet:
    context-path: /shipping

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/shipping_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
